openapi: 3.0.3
info:
  title: prasaarit-upload-services-api
  description: Upload service for Prasaarit
  version: 0.1.0
paths:
  /generate-presigned-url:
    post:
      summary: Generate Presigned Url
      operationId: generate_presigned_url_generate_presigned_url_post
      parameters:
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/URL_TYPE'
          description: 'Upload type: ''single'' or ''multipart''. Defaults to ''single''.'
          default: single
        description: 'Upload type: ''single'' or ''multipart''. Defaults to ''single''.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePresignedUrlRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratePresignedUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        uri: ${lambda_invoke_arn}
        payloadFormatVersion: '2.0'
        description: Generate Presigned Url
        passthroughBehavior: WHEN_NO_MATCH
        timeoutInMillis: 15000
  /initiate-multipart-upload:
    post:
      summary: Initiate Multipart Upload
      operationId: initiate_multipart_upload_initiate_multipart_upload_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiPartUploadInitiateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiPartUploadInitiateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        uri: ${lambda_invoke_arn}
        payloadFormatVersion: '2.0'
        description: Initiate Multipart Upload
        passthroughBehavior: WHEN_NO_MATCH
        timeoutInMillis: 15000
  /complete-multipart-upload:
    post:
      summary: Complete Multipart Upload
      operationId: complete_multipart_upload_complete_multipart_upload_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiPartUploadCompleteRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiPartUploadCompleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        uri: ${lambda_invoke_arn}
        payloadFormatVersion: '2.0'
        description: Complete Multipart Upload
        passthroughBehavior: WHEN_NO_MATCH
        timeoutInMillis: 15000
  /abort-multipart-upload:
    post:
      summary: Abort Multipart Upload
      operationId: abort_multipart_upload_abort_multipart_upload_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiPartUploadAbortRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiPartUploadAbortResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        uri: ${lambda_invoke_arn}
        payloadFormatVersion: '2.0'
        description: Abort Multipart Upload
        passthroughBehavior: WHEN_NO_MATCH
        timeoutInMillis: 15000
components:
  schemas:
    CompletedPart:
      properties:
        PartNumber:
          type: integer
          maximum: 10000.0
          minimum: 1.0
          title: Partnumber
          description: "Part number (1\u201310000)"
        ETag:
          type: string
          title: Etag
          description: ETag returned by S3 in the PUT response header
      type: object
      required:
      - PartNumber
      - ETag
      title: CompletedPart
    GeneratePresignedUrlRequest:
      properties:
        fileSize:
          type: number
          maximum: 5368709120.0
          minimum: 0.0
          title: Filesize
          description: Size of the file in bytes
        contentType:
          type: string
          title: Contenttype
          description: MIME type of the file
        s3Key:
          anyOf:
          - type: string
          - type: 'null'
          title: S3Key
          description: S3 object key. Required when type=multipart.
        uploadId:
          anyOf:
          - type: string
          - type: 'null'
          title: Uploadid
          description: Multipart upload ID. Required when type=multipart.
        partNumber:
          anyOf:
          - type: integer
            maximum: 10000.0
            minimum: 1.0
          - type: 'null'
          title: Partnumber
          description: "Part number (1\u201310000). Required when type=multipart."
      type: object
      required:
      - fileSize
      - contentType
      title: GeneratePresignedUrlRequest
    GeneratePresignedUrlResponse:
      properties:
        mediaId:
          type: string
          title: Mediaid
          description: Media ID
        presignedUrl:
          type: string
          title: Presignedurl
          description: Presigned S3 URL
        expiresIn:
          type: integer
          title: Expiresin
          description: presigned link expiry time
      type: object
      required:
      - mediaId
      - presignedUrl
      - expiresIn
      title: GeneratePresignedUrlResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MultiPartUploadAbortRequest:
      properties:
        uploadId:
          type: string
          title: Uploadid
          description: Multipart upload ID
        s3Key:
          type: string
          title: S3Key
          description: S3 object key
      type: object
      required:
      - uploadId
      - s3Key
      title: MultiPartUploadAbortRequest
    MultiPartUploadAbortResponse:
      properties:
        uploadId:
          type: string
          title: Uploadid
          description: Multipart upload ID
        success:
          type: boolean
          title: Success
          description: Whether the multipart upload was aborted successfully
      type: object
      required:
      - uploadId
      - success
      title: MultiPartUploadAbortResponse
    MultiPartUploadCompleteRequest:
      properties:
        parts:
          items:
            $ref: '#/components/schemas/CompletedPart'
          type: array
          title: Parts
          description: List of completed parts with PartNumber and ETag
        s3Key:
          type: string
          title: S3Key
          description: S3 object key
        uploadId:
          type: string
          title: Uploadid
          description: Multipart upload ID
      type: object
      required:
      - parts
      - s3Key
      - uploadId
      title: MultiPartUploadCompleteRequest
    MultiPartUploadCompleteResponse:
      properties:
        uploadId:
          type: string
          title: Uploadid
          description: Multipart upload ID
        success:
          type: boolean
          title: Success
          description: Whether the multipart upload was completed successfully
      type: object
      required:
      - uploadId
      - success
      title: MultiPartUploadCompleteResponse
    MultiPartUploadInitiateRequest:
      properties:
        fileSize:
          type: number
          maximum: 5368709120.0
          minimum: 0.0
          title: Filesize
          description: Size of the file in bytes
        contentType:
          type: string
          title: Contenttype
          description: MIME type of the file
      type: object
      required:
      - fileSize
      - contentType
      title: MultiPartUploadInitiateRequest
    MultiPartUploadInitiateResponse:
      properties:
        uploadId:
          type: string
          title: Uploadid
          description: Multipart upload ID
        s3Key:
          type: string
          title: S3Key
          description: S3 object key
      type: object
      required:
      - uploadId
      - s3Key
      title: MultiPartUploadInitiateResponse
    URL_TYPE:
      type: string
      enum:
      - single
      - multipart
      title: URL_TYPE
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
